<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page introuvable — ALMA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Fraunces:ital,opsz,wght@0,9..144,200;0,9..144,300;0,9..144,400;1,9..144,400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/main.css">

<style>
.error-page {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 5rem 2rem;
  text-align: center;
}
.error-code {
  font-family: var(--font-display);
  font-size: clamp(8rem, 18vw, 14rem);
  font-weight: 200;
  color: var(--burgundy);
  line-height: 1;
  letter-spacing: -0.05em;
  margin-bottom: 1.5rem;
}
.error-title {
  font-family: var(--font-display);
  font-size: clamp(1.5rem, 3vw, 2.5rem);
  font-weight: 300;
  color: var(--ink);
  margin-bottom: 1rem;
}
.error-message {
  font-family: var(--font-italic);
  font-style: italic;
  font-size: 1.15rem;
  color: var(--ink-soft);
  margin-bottom: 3rem;
  max-width: 500px;
}
</style>
</head>
<body>

<section class="error-page">
  <div class="error-code">404</div>
  <h1 class="error-title">Cette page n'existe pas.</h1>
  <p class="error-message">
    Peut-être qu'elle n'a jamais existé. Peut-être qu'elle est partie. Peut-être qu'elle vous attend ailleurs.
  </p>
  <a href="/" class="btn-primary">Retourner à l'accueil</a>
</section>

</body>
</html>
